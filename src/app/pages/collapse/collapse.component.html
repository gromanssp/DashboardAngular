<div class="mb-6">
  <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-2">Collapse</h2>
  <p class="text-gray-600 dark:text-gray-400">Toggle the visibility of content across your project.</p>
</div>

<app-code-snippet title="Basic Collapse" description="Click the button to toggle the content's visibility." [code]="collapseCode">
  <div class="w-full">
    <button (click)="isCollapsed = !isCollapsed" class="bg-indigo-600 text-white px-4 py-2 rounded-lg shadow-md hover:bg-indigo-700 transition-colors font-medium">
      Toggle content
    </button>
    @if (!isCollapsed) {
      <div class="mt-4 p-4 border rounded-xl shadow-sm bg-white dark:bg-gray-800 dark:border-gray-700 dark:text-gray-200" style="animation: fade-in 0.3s ease-out;">
        Some placeholder content for the collapse component. This panel is controlled by evaluating the angular &#64;if directive locally via a boolean state.
      </div>
    }
  </div>
</app-code-snippet>
