<div class="mb-6">
  <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-2">Tables</h2>
  <p class="text-gray-600 dark:text-gray-400">Data tables allow you to present information in a grid-like format.</p>
</div>

<app-code-snippet title="Default Table" description="A basic table layout with hovering effects." [code]="tableCode1">
  <div class="relative overflow-x-auto shadow-sm sm:rounded-xl border border-gray-100 dark:border-gray-700 w-full mb-4">
    <table class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400">
      <thead class="text-xs text-gray-700 uppercase bg-gray-100 dark:bg-gray-700 dark:text-gray-300">
        <tr>
          <th scope="col" class="px-6 py-3">Product name</th>
          <th scope="col" class="px-6 py-3">Color</th>
          <th scope="col" class="px-6 py-3">Category</th>
          <th scope="col" class="px-6 py-3">Price</th>
          <th scope="col" class="px-6 py-3">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
          <th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap dark:text-white">Apple MacBook Pro 17"</th>
          <td class="px-6 py-4">Silver</td>
          <td class="px-6 py-4">Laptop</td>
          <td class="px-6 py-4 mb-2">$2999</td>
          <td class="px-6 py-4">
            <a href="javascript:void(0)" class="font-medium text-blue-600 dark:text-blue-500 hover:underline">Edit</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</app-code-snippet>
