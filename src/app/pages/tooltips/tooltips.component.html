<div class="mb-6">
  <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-2">Tooltips</h2>
  <p class="text-gray-600 dark:text-gray-400">Tooltips display informative text when users hover over, focus on, or tap an element.</p>
</div>

<app-code-snippet title="Default Tooltip" description="A simple tooltip using CSS hover group." [code]="tooltipCode1">
  <div class="w-full flex justify-center py-8">
    <div class="relative flex flex-col items-center group cursor-pointer">
      <button type="button" class="text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800 transition-colors shadow-sm">
        Hover me
      </button>
      <div class="absolute bottom-0 flex-col items-center hidden mb-14 group-hover:flex" style="animation: fade-in 0.2s ease-out;">
        <div class="relative z-10 p-2 text-sm leading-none text-white whitespace-no-wrap bg-gray-900 shadow-lg rounded-md">
          Tooltip content
        </div>
        <div class="w-3 h-3 -mt-2 rotate-45 bg-gray-900"></div>
      </div>
    </div>
  </div>
</app-code-snippet>
