<div class="mb-6">
  <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-2">Badges</h2>
  <p class="text-gray-600 dark:text-gray-400">Badges highlight new or unread items, status, and categories.</p>
</div>

<app-code-snippet title="Default Badges" description="Use default badges to indicate status or categories." [code]="badgeCode1">
  <span class="px-2 py-1 text-xs font-semibold rounded-full bg-blue-100 text-blue-800">Primary</span>
  <span class="px-2 py-1 text-xs font-semibold rounded-full bg-red-100 text-red-800">Danger</span>
  <span class="px-2 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800">Success</span>
</app-code-snippet>

<app-code-snippet title="Badges with Icons" description="Badges can contain icons to add more context." [code]="badgeCode2">
  <span class="inline-flex items-center gap-1.5 px-3 py-1 text-sm font-medium rounded-md bg-gray-100 text-gray-800">
    <i class="fas fa-star text-yellow-500"></i> Featured
  </span>
</app-code-snippet>
