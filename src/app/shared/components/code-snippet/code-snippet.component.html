<div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden mb-8 shadow-sm">
  <!-- Header -->
  <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700">
    <h3 class="text-lg font-bold text-gray-800 dark:text-white">{{ title }}</h3>
    @if(description){
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">{{ description }}</p>
    }
  </div>

  <!-- Component Preview Space (ng-content) -->
  <div class="p-6 bg-gray-50/50 dark:bg-gray-900/50 min-h-[100px] flex items-center gap-4 flex-wrap">
    <ng-content></ng-content>
  </div>

  <!-- Code Block -->
  <div class="relative bg-gray-900 text-gray-100 p-4 border-t border-gray-700">
    <!-- Header code action -->
    <div class="flex justify-between items-center mb-3">
      <span class="text-xs font-mono text-gray-400">HTML Fragment</span>
      <button 
        (click)="copyCode()" 
        class="text-xs bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-md px-3 py-1.5 transition-colors flex items-center gap-2">
        @if(isCopied){
          <i class="fas fa-check text-green-400"></i> Copied
        } @else {
          <i class="far fa-copy"></i> Copy code
        }
      </button>
    </div>
    
    <pre class="overflow-x-auto text-sm font-mono text-gray-300"><code>{{ code }}</code></pre>
  </div>
</div>
